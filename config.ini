# KDE Vosk Dictation Configuration

[General]
# Path to Vosk model directory
# Download models from: https://alphacephei.com/vosk/models
model_path = ~/vosk-models/vosk-model-small-en-us-0.15

[Hotkey]
# Global hotkey to toggle dictation
# Examples: Ctrl+Shift+Space, Meta+D, Ctrl+Alt+V
shortcut = Ctrl+Shift+Space

[Audio]
# Sample rate for audio recording (Hz)
sample_rate = 16000

# Audio chunk size (frames per buffer)
chunk_size = 4000

[Behavior]
# Show desktop notifications
show_notifications = true

# Auto-inject text after stopping recording
auto_inject = true

# Add a space after injected text
add_trailing_space = false
